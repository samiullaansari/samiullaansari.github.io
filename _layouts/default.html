<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 650px;
      margin: 40px auto;
      padding: 0 10px;
      line-height: 1.5;
      font-size: 15px;
      color: #111;
    }

    /* NAVIGATION */
    .nav {
      font-size: 14px;
      margin-bottom: 20px;
    }

    .nav a {
      margin-right: 12px;
      color: #0000EE;
      text-decoration: underline;
    }

    /* TYPOGRAPHY */
    h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    h2 {
      font-size: 16px;
      margin-top: 25px;
    }

    p {
      margin: 8px 0;
    }

    a {
      color: #0000EE;
      text-decoration: underline;
    }

    /* ===== CAREER TIMELINE (FIXED - CONTINUOUS LINE) ===== */

    .career {
      position: relative;
      margin-top: 15px;
    }

    /* SINGLE CONTINUOUS VERTICAL LINE */
    .career::before {
      content: "";
      position: absolute;
      left: 110px;   /* adjust slightly if needed */
      top: 0;
      bottom: 0;
      width: 1px;
      background: #ccc;
    }

    .row {
      display: grid;
      grid-template-columns: 110px 20px 1fr;
      align-items: start;
      margin-bottom: 22px;
    }

    /* YEAR */
    .year {
      font-size: 13px;
      color: #777;
      text-align: right;
      padding-right: 10px;
      line-height: 1.4;
    }

    /* MIDDLE COLUMN (DOT ONLY) */
    .line {
      display: flex;
      justify-content: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #bbb;
      border-radius: 50%;
      margin-top: 6px;
    }

    /* CONTENT */
    .content {
      padding-left: 10px;
      line-height: 1.5;
    }

    /* LOGO */
    .logo {
      height: 20px;
      vertical-align: middle;
      margin-right: 6px;
    }

  </style>
</head>

<body>

<div class="nav">
  <a href="/">home</a>
  <a href="/projects">projects</a>
  <a href="/blog">writeups</a>
  <a href="https://www.linkedin.com/in/sami-iitb/" target="_blank">linkedin</a>
  <a href="https://github.com/samiullaansari" target="_blank">github</a>
</div>

{{ content }}

</body>
</html>
