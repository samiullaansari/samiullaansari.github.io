<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 30px auto;
      padding-left: 40px;
      line-height: 1.45;
      font-size: 14px;
      color: #222;
    }

    /* NAV */
    .nav {
      font-size: 13px;
      margin-bottom: 15px;
    }

    .nav a {
      margin-right: 12px;
      color: #0000EE;
      text-decoration: underline;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 25px;
    }

    .profile-img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
    }

    .header-text h1 {
      margin: 0;
      font-size: 22px;
    }

    .tagline {
      margin: 4px 0;
      color: #666;
    }

    .social a {
      margin-right: 10px;
      font-size: 13px;
    }

    /* DIVIDER */
    .divider {
      height: 1px;
      margin: 20px 0;
      background: linear-gradient(to right, transparent, #ccc, transparent);
    }

    /* HEADINGS */
    h2 {
      font-size: 15px;
      margin-top: 20px;
    }

    a {
      color: #0000EE;
      text-decoration: underline;
    }

    /* ===== TIMELINE ===== */

    .career {
      position: relative;
    }

    .career::before {
      content: "";
      position: absolute;
      left: 118px;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: #d6d6d6;
    }

    .row {
      display: grid;
      grid-template-columns: 110px 20px 1fr;
      margin-bottom: 14px;
    }

    .year {
      font-size: 12px;
      color: #999;
      text-align: right;
      padding-right: 8px;
    }

    .line {
      display: flex;
      justify-content: center;
      position: relative;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #c8c8c8;
      border-radius: 50%;
      position: relative;
      top: 5px;
      z-index: 2;
    }

    /* GAP EFFECT */
    .line::before {
      content: "";
      position: absolute;
      width: 12px;
      height: 16px;
      background: white;
      top: 0;
      z-index: 1;
    }

    /* CONTENT */
    .content {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .content-text {
      flex: 1;
      line-height: 1.4;
    }

    .logo {
      height: 26px;
      margin-top: 2px;
    }

  </style>
</head>

<body>

<div class="nav">
  <a href="/">home</a>
  <a href="/projects">projects</a>
  <a href="/blog">writeups</a>
  <a href="https://www.linkedin.com/in/sami-iitb/" target="_blank">linkedin</a>
  <a href="https://github.com/samiullaansari" target="_blank">github</a>
</div>

{{ content }}

</body>
</html>
