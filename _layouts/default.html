<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 650px;
      margin: 40px auto;
      padding: 0 10px;
      line-height: 1.5;
      font-size: 15px;
      color: #111;
    }

    /* NAVIGATION */
    .nav {
      font-size: 14px;
      margin-bottom: 20px;
    }

    .nav a {
      margin-right: 12px;
      color: #0000EE;
      text-decoration: underline;
    }

    /* TYPOGRAPHY */
    h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    h2 {
      font-size: 16px;
      margin-top: 25px;
    }

    p {
      margin: 8px 0;
    }

    a {
      color: #0000EE;
      text-decoration: underline;
    }

/* ===== KARPATHY FINAL TIMELINE WITH GAP ===== */

    .career {
      position: relative;
      margin-top: 10px;
    }

    /* CONTINUOUS LINE */
    .career::before {
      content: "";
      position: absolute;
      left: 99px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: #d3d3d3;
    }

    /* ROW */
    .row {
      display: grid;
      grid-template-columns: 90px 18px 1fr;
      align-items: start;
      margin-bottom: 12px;
      position: relative;
    }

    /* YEAR */
    .year {
      font-size: 13px;
      color: #888;
      text-align: right;
      padding-right: 6px;
    }

    /* DOT COLUMN */
    .line {
      display: flex;
      justify-content: center;
      position: relative;
    }

    /* DOT */
    .dot {
      width: 6px;
      height: 6px;
      background: #c6c6c6;
      border-radius: 50%;
      margin-top: 6px;
      position: relative;
      z-index: 2;
    }

    /* CREATE GAP IN LINE (MAGIC PART) */
    .line::before {
      content: "";
      position: absolute;
      width: 10px;
      height: 14px;
      background: white;   /* SAME as page background */
      top: 0px;
      z-index: 1;
    }

    /* CONTENT */
    .content {
      padding-left: 6px;
      line-height: 1.4;
    }

    /* LOGO */
    .logo {
      height: 22px;
      vertical-align: middle;
      margin-right: 8px;
    }

  </style>
</head>

<body>

<div class="nav">
  <a href="/">home</a>
  <a href="/projects">projects</a>
  <a href="/blog">writeups</a>
  <a href="https://www.linkedin.com/in/sami-iitb/" target="_blank">linkedin</a>
  <a href="https://github.com/samiullaansari" target="_blank">github</a>
</div>

{{ content }}

</body>
</html>
