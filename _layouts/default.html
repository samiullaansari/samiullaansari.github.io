<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      line-height: 1.45;
      font-size: 14px;
      color: #222;
      background: #fff;
    }

    /* MAIN WRAPPER */
    .wrapper {
      max-width: 900px;
      margin: 30px auto;
    }

    /* NAV */
    .nav {
      font-size: 13px;
      margin-bottom: 20px;
    }

    .nav a {
      margin-right: 12px;
      color: #0000EE;
      text-decoration: underline;
    }

    /* HEADER (NARROW + CENTERED) */
    .header-container {
      max-width: 620px;
      margin: 0 auto 12px auto;
    }

    .header {
      display: flex;
      align-items: flex-start;
      gap: 24px;
    }

    .profile-img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .header-text h1 {
      margin: 0;
      font-size: 22px;
    }

    .tagline {
      margin: 4px 0;
      color: #666;
    }

    .social a {
      margin-right: 10px;
      font-size: 13px;
    }

    /* CONTENT AREA */
    .content-container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* DIVIDER */
    .divider {
      height: 1px;
      margin: 28px 0;
      background: linear-gradient(to right, transparent, #bbb, transparent);
    }

    /* TIMELINE */
    .career {
      position: relative;
      margin-top: 6px;
    }

    /* PERFECTLY CENTERED LINE */
    .career::before {
      content: "";
      position: absolute;
      left: calc(110px + 10px);
      top: 10px;
      bottom: 10px;
      width: 1px;
      background: #d0d0d0;
    }

    .row {
      display: grid;
      grid-template-columns: 110px 20px 1fr;
      margin-bottom: 16px;
    }

    .year {
      font-size: 12px;
      color: #999;
      text-align: right;
      padding-right: 10px;
    }

    .line {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* DOT */
    .dot {
      width: 6px;
      height: 6px;
      background: #c8c8c8;
      border-radius: 50%;
      z-index: 2;
    }

    /* GAP EFFECT */
    .line::before {
      content: "";
      position: absolute;
      width: 12px;
      height: 16px;
      background: #fff;
      z-index: 1;
    }

    /* CONTENT */
    .content {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .logo {
      height: 24px;
      margin-top: 2px;
    }

    .content-text {
      line-height: 1.4;
    }

  </style>
</head>

<body>

<div class="wrapper">

  <div class="nav">
    <a href="/">home</a>
    <a href="/projects">projects</a>
    <a href="/blog">writeups</a>
    <a href="https://www.linkedin.com/in/sami-iitb/" target="_blank">linkedin</a>
    <a href="https://github.com/samiullaansari" target="_blank">github</a>
  </div>

  {{ content }}

</div>

</body>
</html>
