career:
  - year: "2026 -"
    image: /assets/academian.jpg
    alt: Aceademian logo
    text: |
      [**Academian**](https://academian.com/), Lead AI Engineer

      Recently joined to work on applied AI products built around language models, retrieval, and agentic workflows.

      Right now the focus is on building the foundations well: evaluation loops, reusable orchestration patterns, and the infrastructure needed to turn promising ideas into dependable product features.
  - year: 2024 - 2026
    image: /assets/hsbc.png
    alt: HSBC logo
    text: |
      [**HSBC MSS**](https://www.hsbc.com/), Senior AI Engineer

      Worked on AI systems for trade settlement and reconciliation, where the main challenge was not just model accuracy but making automation dependable enough for high-stakes operational workflows.

      Built multi-agent workflows, pattern-driven RAG pipelines, and reliability layers around LLM-based extraction and automation. This included systems for cashflow extraction, reconciliation rule generation, and intelligent handling of production support alerts.

      The strongest outcomes were concrete: extraction accuracy improved from **70% to 96%**, manual settlement effort dropped from **40 people to 5**, and turnaround time went from hours to under a minute.
  - year: 2020 - 2024
    image: /assets/jio.jpg
    alt: Jio logo
    text: |
      [**Reliance Jio**](https://www.jio.com/), Data Scientist

      Worked on forecasting, anomaly detection, and data systems for telecom operations at large scale.

      Built models for utilization forecasting and predictive fault detection, and later worked on retrieval-based systems over internal documents and network data.

      The most meaningful production outcomes were reducing forecast error from **13% to 4%** and helping reduce unplanned outages by **~40%** through earlier fault prediction and better operational visibility.
  - year: 2018 - 2020
    image: /assets/iitb.png
    alt: IIT Bombay logo
    text: |
      [**Indian Institute of Technology Bombay**](https://www.iitb.ac.in/), M.Tech

      Completed an M.Tech with focus on machine learning, deep learning, and data mining.

      This was where the technical foundations became more formal: models, optimization, experimentation, probability, statistics, and the discipline of evaluating systems carefully instead of relying on intuition. I graduated with a GPA of **8.6/10**, and a lot of the later production work in AI and ML sits on top of habits built during this period.
  - year: 2013 - 2017
    image: /assets/aktu_logo.png
    alt: AKTU logo
    text: |
      [**AKTU**](https://aktu.ac.in/), B.Tech in Mechanical Engineering

      Studied mechanical engineering.

      In practice, this was where the broader engineering habit formed: learning how to reason from first principles, work through systems, and stay comfortable with quantitative problem solving.

      The foundation was built through mathematics, mechanics, modeling, numerical methods, and core engineering analysis. The eventual move into software, data, and AI came later, but the underlying engineering mindset started here.
